syntax = "proto3";
package kratos.api;

option go_package = "temperate/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Registry registry = 3;
  Config config = 4;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
    repeated string read_sources = 3;
    int32 max_idle_conns = 4;
    int32 max_open_conns = 5;
    google.protobuf.Duration conn_max_lifetime = 6;
    bool debug = 7;
    bool auto_migrate = 8;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message API {
    bool auth = 1;
    string signing_method = 2;
    string jwt_key = 3;
    bool metrics = 4;
    string metrics_path = 5;
    bool ratelimit = 6;
    bool tracing = 7;
    string tracing_endpoint = 8;
  }
  Database database = 2;
  Redis redis = 3;
  API api = 1;
}

message Registry {
  bool enabled = 1;
  string driver = 2;
  repeated string endpoints = 3;
  string namespace = 4;
  string username = 5;
  string password = 6;
  string token = 7;
  string datacenter = 8;
  string group = 9;
  string cluster = 10;
  string service_token = 11;
  string protocol = 12;
  int32 ttl_seconds = 13;
  string kubeconfig = 14;
  string context_path = 15;
  bool health_check = 16;
  bool heartbeat = 17;
  int32 weight = 18;
  int32 timeout_seconds = 19;
  int32 retry_count = 20;
  string region = 21;
  string zone = 22;
  string env = 23;
  string host = 24;
}

message Config {
  message Env {
    bool enabled = 1;
    string prefix = 2;
  }
  message Remote {
    bool enabled = 1;
    string driver = 2;
    repeated string endpoints = 3;
    string path = 4;
    string namespace = 5;
    string group = 6;
    string cluster = 7;
    string data_id = 8;
    string app_id = 9;
    string secret = 10;
    string token = 11;
    string username = 12;
    string password = 13;
    string kubeconfig = 14;
    string master = 15;
    string label_selector = 16;
    string field_selector = 17;
    string file_group = 18;
    string file_name = 19;
    string context_path = 20;
    int32 timeout_seconds = 21;
  }
  message Watch {
    bool enabled = 1;
    repeated string keys = 2;
  }
  Env env = 1;
  Remote remote = 2;
  Watch watch = 3;
}
