syntax = "proto3";

package temperate.v1;

import "errors/errors.proto";

option go_package = "temperate/api/temperate/v1;v1";
option java_multiple_files = true;
option java_package = "io.grpc.examples.temperate.v1";
option java_outer_classname = "ErrorReasonProto";
option objc_class_prefix = "APITemperateV1";

enum ErrorReason {
  option (errors.default_code) = 500;

  INCIDENT_UNSPECIFIED = 0;

  INCIDENT_NOT_FOUND = 1 [
    (errors.code) = 404
  ];

  INCIDENT_ALREADY_EXISTS = 2 [
    (errors.code) = 409
  ];

  INCIDENT_INVALID_ARGUMENT = 3 [
    (errors.code) = 400
  ];
}
